name: Build and Publish

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to build (e.g. crossplane-headlamp-plugin-v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint and type-check
        run: npm run lint && npm run tsc

      - name: Build
        run: npm run build

      - name: Package
        run: npm run package

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag_name }}
          files: '*.tar.gz'
          fail_on_unmatched_files: true
